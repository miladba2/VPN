*{box-sizing:border-box;margin:0;padding:0;font-family:'IRANSansWeb',-apple-system,Tahoma,Arial,sans-serif;}
:root{
  --bg:#f3f4f6;--card:#fff;--border:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --blue:#2563eb;--blue-l:#eff6ff;--blue-d:#1d4ed8;
  --green:#059669;--green-l:#ecfdf5;
  --red:#dc2626;--red-l:#fef2f2;
  --amber:#d97706;--amber-l:#fffbeb;
  --gray-l:#f9fafb;--gray-m:#f3f4f6;
  --sidebar:#fff;--header:#fff;--nav:#fff;
  --brand:#2563eb;--brand-d:#1d4ed8;--brand-text:#fff;--brand-rgb:37,99,235;
}
.dark{
  --bg:#0a1730;--card:#11254a;--border:#1d3461;--text:#f1f4f9;--text2:#a8b6cf;--text3:#7588ad;
  --blue-l:#16284f;--green-l:#143e29;--red-l:#3f1822;--amber-l:#3d2a10;
  --gray-l:#16284f;--gray-m:#16284f;
  --sidebar:#0e1f3f;--header:#0e1f3f;--nav:#0e1f3f;
  --accent:#3ecf5a;--accent-d:#2eb84a;
  --brand:#3ecf5a;--brand-d:#2eb84a;--brand-text:#06210f;--brand-rgb:62,207,90;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;
  --blue:#60a5fa;--blue-d:#93c5fd;
}
body{background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}
a{text-decoration:none;}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}

/* Layout */
#header{position:fixed;top:0;right:0;left:0;z-index:100;background:var(--header);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
#sidebar{display:none;position:fixed;right:0;top:0;height:100%;width:220px;background:var(--sidebar);
  border-left:1px solid var(--border);flex-direction:column;padding-top:58px;z-index:90;}
#main{padding:58px 0 80px;max-width:700px;margin:0 auto;}
#bottomnav{position:fixed;bottom:0;right:0;left:0;z-index:100;background:var(--nav);
  border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
@media(min-width:768px){
  #sidebar{display:flex;}
  #main{margin-right:220px;padding-bottom:24px;}
  #bottomnav{display:none;}
}
.page{display:none;padding:20px 16px;}
.page.active{display:block;}

/* Header elements */
.logo{width:34px;height:34px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo svg{color:#fff;}
.hbrand{font-weight:700;font-size:14px;color:var(--text);display:block;}
.hbtns{display:flex;align-items:center;gap:8px;}
.iconbtn{width:36px;height:36px;border-radius:10px;background:var(--gray-m);display:flex;align-items:center;
  justify-content:center;color:var(--text2);position:relative;transition:.15s;}
.iconbtn:hover{background:var(--border);}
.badge{position:absolute;top:6px;left:6px;width:8px;height:8px;background:#dc2626;border-radius:50%;}
.avatar{width:36px;height:36px;border-radius:10px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;color:var(--brand);}

/* Sidebar nav */
.snav{flex:1;padding:12px;}
.snavbtn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;
  font-size:14px;font-weight:500;color:var(--text2);transition:.15s;margin-bottom:2px;}
.snavbtn:hover{background:var(--gray-m);}
.snavbtn.active{background:var(--brand);color:var(--brand-text);}
.snavbtn svg{flex-shrink:0;}
.slogout{padding:12px;border-top:1px solid var(--border);}

/* Bottom nav */
.bnitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  color:var(--text3);font-size:11px;transition:.15s;}
.bnitem.active{color:var(--brand);}
.bnicon{padding:6px;border-radius:10px;}
.bnitem.active .bnicon{background:var(--blue-l);}

/* Cards & common */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);}
.card-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:600px){.grid4{grid-template-columns:1fr 1fr 1fr 1fr;}}

/* Stat card */
.statcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;
  display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.staticon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.statval{font-size:22px;font-weight:800;color:var(--text);word-break:break-word;}
.statlbl{font-size:12px;color:var(--text2);margin-bottom:2px;}
.statsub{font-size:11px;color:var(--text3);margin-top:1px;}
.trend{font-size:11px;font-weight:600;margin-top:4px;}
.trend.up{color:var(--green);}.trend.dn{color:var(--red);}

/* Status badges */
.badge-active{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#dcfce7;color:#15803d;}
.badge-expiring{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;}
.badge-expired{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fee2e2;color:#991b1b;}
.badge-inactive{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--gray-m);color:var(--text2);}

/* Buttons */
.btn{padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-blue{background:var(--brand);color:var(--brand-text);}.btn-blue:hover{background:var(--brand-d);}
.btn-green{background:#059669;color:#fff;}.btn-green:hover{background:#047857;}
.btn-red{background:#dc2626;color:#fff;}.btn-red:hover{background:#b91c1c;}
.btn-gray{background:var(--gray-m);color:var(--text);}.btn-gray:hover{background:var(--border);}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:10px;}
.btn-xs{padding:6px 10px;font-size:12px;border-radius:8px;}

/* Form */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-label{font-size:13px;font-weight:500;color:var(--text2);}
.form-input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:14px;transition:.15s;}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.15);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Search */
.searchbox{position:relative;margin-bottom:12px;}
.searchbox input{width:100%;padding:10px 14px 10px 14px;padding-right:38px;border-radius:12px;
  border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;}
.searchbox input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.15);}
.searchicon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);}

/* Filter tabs */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.filters::-webkit-scrollbar{height:0;}
.ftab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--gray-m);color:var(--text2);border:none;cursor:pointer;transition:.15s;}
.ftab.active{background:var(--brand);color:var(--brand-text);}

/* User card (compact accordion) */
.ucard-compact{background:var(--card);border:1px solid var(--border);border-radius:14px;
  margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden;transition:.15s;}
.ucard-compact.open{border-color:var(--brand);}
.ucard-row{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;}
.uname-compact{font-weight:600;font-size:13px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.udays-compact{font-size:13px;font-weight:700;white-space:nowrap;}
.uchev{color:var(--text3);display:flex;align-items:center;flex-shrink:0;}
.ucard-details{padding:0 14px 14px;border-top:1px solid var(--border);margin-top:2px;padding-top:10px;}
.uinfo{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.uinfo-cell{background:var(--gray-l);border-radius:8px;padding:6px 8px;}
.uinfo-k{font-size:10px;color:var(--text3);}
.uinfo-v{font-size:11px;font-weight:600;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.uinfo-days{font-size:9px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.umeta{font-size:12px;color:var(--text3);margin-top:2px;direction:ltr;text-align:right;}
.uactions{display:flex;gap:6px;margin-top:10px;}
.uact{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;
  border-radius:10px;font-size:12px;font-weight:500;transition:.15s;}
.uact-edit{background:var(--blue-l);color:var(--brand);}.uact-edit:hover{background:var(--border);}
.uact-renew{background:var(--green-l);color:var(--green);}.uact-renew:hover{background:var(--border);}
.uact-hist{background:var(--gray-m);color:var(--text2);}.uact-hist:hover{background:var(--border);}
.uact-del{width:34px;flex:none;background:var(--red-l);color:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;}.uact-del:hover{background:var(--border);}

/* Alert */
.alert{padding:14px;border-radius:14px;display:flex;gap:10px;margin-bottom:12px;}
.alert-warn{background:var(--amber-l);border:1px solid #fcd34d;}
.dark .alert-warn{border-color:#5c4115;}
.alert-warn svg{color:var(--amber);flex-shrink:0;}
.alert-warn .at{font-weight:600;font-size:13px;color:#92400e;}
.dark .alert-warn .at{color:var(--amber);}
.alert-warn .as{font-size:12px;color:#b45309;margin-top:2px;}
.dark .alert-warn .as{color:var(--amber);opacity:.85;}

/* Mini bar chart */
.chart{display:flex;align-items:flex-end;gap:3px;height:56px;margin-bottom:6px;}
.bar{flex:1;border-radius:3px 3px 0 0;transition:.3s;}
.chart-labels{display:flex;justify-content:space-between;}
.chart-labels span{font-size:9px;color:var(--text3);flex:1;text-align:center;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay.open{align-items:center;}}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:24px 24px 0 0;
  max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
@media(min-width:600px){.modal{border-radius:20px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border);}
.modal-title{font-weight:700;font-size:15px;color:var(--text);}
.modal-body{overflow-y:auto;flex:1;padding:20px;}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--gray-m);display:flex;
  align-items:center;justify-content:center;color:var(--text2);}
.modal-close:hover{background:var(--border);}

/* Jalali picker */
.jpicker{position:relative;}
.jpicker-btn{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:14px;text-align:right;cursor:pointer;transition:.15s;}
.jpicker-btn:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.15);}
.jpicker-popup{display:none;position:absolute;top:calc(100% + 4px);right:0;z-index:300;
  background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.15);
  padding:12px;width:280px;}
.jpicker-popup.open{display:block;}
.jp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.jp-navbtn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text2);background:var(--gray-m);transition:.15s;}
.jp-navbtn:hover{background:var(--border);}
.jp-month{font-weight:700;font-size:14px;color:var(--text);}
.jp-daynames{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.jp-dayname{text-align:center;font-size:11px;color:var(--text3);padding:3px 0;font-weight:500;}
.jp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.jp-day{height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;
  border-radius:50%;cursor:pointer;color:var(--text);transition:.15s;}
.jp-day:hover{background:var(--gray-m);}
.jp-day.today{background:var(--blue-l);color:var(--brand);font-weight:600;}
.jp-day.selected{background:var(--brand);color:var(--brand-text);font-weight:700;}
.jp-day.empty{cursor:default;}
.jp-today-btn{width:100%;padding:6px;margin-top:8px;font-size:12px;font-weight:500;
  color:var(--brand);border-top:1px solid var(--border);padding-top:8px;text-align:center;transition:.15s;}
.jp-today-btn:hover{background:var(--blue-l);border-radius:0 0 8px 8px;}

/* Plan card */
.plancard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.proto{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:4px;}
.proto-v2ray{background:#dbeafe;color:#1d4ed8;}
.proto-xray{background:#ede9fe;color:#6d28d9;}
.proto-trojan{background:#fee2e2;color:#991b1b;}
.proto-shadowsocks{background:#ffedd5;color:#c2410c;}
.proto-wireguard{background:#cffafe;color:#0e7490;}
.proto-openvpn{background:#dcfce7;color:#15803d;}

/* Finance */
.finrow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.finrow:last-child{border-bottom:none;}
.fin-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Notification panel */
.notif-panel{display:none;position:fixed;inset:0;z-index:150;}
.notif-panel.open{display:block;}
.notif-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);}
.notif-inner{position:absolute;top:0;left:0;width:100%;max-width:360px;height:100%;
  background:var(--card);overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.15);}
.notif-head{position:sticky;top:0;background:var(--card);padding:14px 16px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-radius:12px;margin:8px;}
.notif-warn{background:var(--amber-l);border:1px solid #fcd34d;}
.notif-danger{background:var(--red-l);border:1px solid #fca5a5;}
.dark .notif-warn{border-color:#5c4115;}
.dark .notif-danger{border-color:#5c1f2b;}

/* Toggle */
.toggle{width:44px;height:24px;border-radius:12px;background:#d1d5db;position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--brand);}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on .toggle-knob{left:23px;}

/* Divider */
.divider{height:1px;background:var(--border);margin:8px 0;}

/* Page header */
.page-head{margin-bottom:16px;}
.page-title{font-size:20px;font-weight:800;color:var(--text);}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px;}

/* List table */
.list-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.list-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.list-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}

/* Renewal history */
.rh-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-l);border-radius:12px;margin-bottom:8px;}
.rh-icon{width:32px;height:32px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Security badge */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.sec-row:last-child{border-bottom:none;}
.sec-ok{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--green-l);color:var(--green);}

/* Confirm box */
.confirm-box{text-align:center;padding:8px 0;}
.confirm-icon{width:56px;height:56px;border-radius:50%;background:var(--red-l);display:flex;
  align-items:center;justify-content:center;margin:0 auto 12px;}
.confirm-text{font-size:14px;color:var(--text2);margin-bottom:16px;}

/* Print styles */
@media print{
  #header,#sidebar,#bottomnav,#syncStatus,.overlay,.notif-panel{display:none!important;}
  #main{margin:0!important;padding:0!important;}
  body{background:#fff!important;color:#000!important;}
  .page{display:none!important;}
  .page.active{display:block!important;}
  .list-card,.card,.statcard{box-shadow:none!important;border:1px solid #ddd!important;}
}
</style>

// ══════ PERSIAN DIGITS ══════
var FA_DIGITS=['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function faNum(input){
  if(input===null||input===undefined)return'';
  var s=String(input);
  var out='';
  for(var i=0;i<s.length;i++){
    var c=s.charAt(i);
    out += (c>='0'&&c<='9') ? FA_DIGITS[c.charCodeAt(0)-48] : c;
  }
  return out;
}
function faNumComma(num){
  // فرمت با جداکننده هزار و اعداد فارسی
  var n=Number(num)||0;
  var s=n.toLocaleString('en-US');
  return faNum(s);
}
function faK(num){
  // نمایش کامل مبلغ با جداکننده هزار و اعداد فارسی (بدون واحد)
  return faNumComma(num);
}
function faToman(num){
  // نمایش کامل مبلغ با جداکننده هزار، اعداد فارسی و واحد تومان
  return faNumComma(num)+' تومان';
}

// ══════ MONEY INPUT (فارسی + جداکننده هزار) ══════
var FA_TO_EN={'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
function digitsToEn(s){
  if(!s)return'';
  var out='';
  for(var i=0;i<s.length;i++){
    var c=s.charAt(i);
    out += FA_TO_EN[c]!==undefined ? FA_TO_EN[c] : c;
  }
  return out;
}
function moneyRaw(val){
  // هر چیزی غیر از رقم را حذف می‌کند و عدد خام (انگلیسی) برمی‌گرداند
  var en=digitsToEn(String(val||''));
  var only=en.replace(/[^0-9]/g,'');
  return only;
}
function moneyFormat(val){
  // عدد خام را با کاما و رقم فارسی فرمت می‌کند
  var raw=moneyRaw(val);
  if(!raw)return'';
  var withComma=raw.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return faNum(withComma);
}
function moneyInputHandler(el){
  var raw=moneyRaw(el.value);
  el.value=moneyFormat(raw);
  // مکان نشانگر را در انتها نگه می‌داریم (ساده‌ترین رفتار پایدار برای این نوع فیلد)
  var len=el.value.length;
  try{ el.setSelectionRange(len,len); }catch(e){}
}
function moneyInputHtml(id,placeholder,value){
  var v=value?moneyFormat(String(value)):'';
  return '<input class="form-input money-input" type="text" inputmode="numeric" id="'+id+'" dir="rtl" '
    +'value="'+v+'" placeholder="'+(placeholder?moneyFormat(String(placeholder)):'')+'" '
    +'oninput="moneyInputHandler(this)"/>';
}
function getMoneyValue(id){
  var el=document.getElementById(id);
  if(!el)return 0;
  return Number(moneyRaw(el.value))||0;
}

// ══════ JALALI ══════
var JM=["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
var JD=["ش","ی","د","س","چ","پ","ج"];
var JMD=[31,31,31,31,31,31,30,30,30,30,30,29];

function jDiv(a,b){return ~~(a/b);}
function jMod(a,b){return a-~~(a/b)*b;}
function jalCal(jy){
  var breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];
  var bl=breaks.length;
  var gy=jy+621;
  var leapJ=-14,jp=breaks[0];
  var jump=0;
  for(var i=1;i<bl;i+=1){
    var jm=breaks[i];
    jump=jm-jp;
    if(jy<jm) break;
    leapJ=leapJ+jDiv(jump,33)*8+jDiv(jMod(jump,33),4);
    jp=jm;
  }
  var n=jy-jp;
  leapJ=leapJ+jDiv(n,33)*8+jDiv(jMod(n,33)+3,4);
  if(jMod(jump,33)===4 && jump-n===4) leapJ+=1;
  var leapG=jDiv(gy,4)-jDiv((jDiv(gy,100)+1)*3,4)-150;
  var march=20+leapJ-leapG;
  if(jump-n<6) n=n-jump+jDiv(jump+4,33)*33;
  var leap=jMod(jMod(n+1,33)-1,4);
  if(leap===-1) leap=4;
  return {leap:leap,gy:gy,march:march};
}
function g2d(gy,gm,gd){
  var d=jDiv((gy+jDiv(gm-8,6)+100100)*1461,4)+jDiv(153*jMod(gm+9,12)+2,5)+gd-34840408;
  d=d-jDiv(jDiv(gy+100100+jDiv(gm-8,6),100)*3,4)+752;
  return d;
}
function d2g(jdn){
  var j=4*jdn+139361631;
  j=j+jDiv(jDiv(4*jdn+183187720,146097)*3,4)*4-3908;
  var i=jDiv(jMod(j,1461),4)*5+308;
  var gd=jDiv(jMod(i,153),5)+1;
  var gm=jMod(jDiv(i,153),12)+1;
  var gy=jDiv(j,1461)-100100+jDiv(8-gm,6);
  return {gy:gy,gm:gm,gd:gd};
}
function j2d(jy,jm,jd){
  var r=jalCal(jy);
  return g2d(r.gy,3,r.march)+(jm-1)*31-jDiv(jm,7)*(jm-7)+jd-1;
}
function d2j(jdn){
  var gy=d2g(jdn).gy;
  var jy=gy-621;
  var r=jalCal(jy);
  var jdn1f=g2d(gy,3,r.march);
  var k=jdn-jdn1f;
  if(k>=0){
    if(k<=185){
      var jm=1+jDiv(k,31);
      var jd=jMod(k,31)+1;
      return {jy:jy,jm:jm,jd:jd};
    } else {
      k-=186;
    }
  } else {
    jy-=1;
    k+=179;
    if(r.leap===1) k+=1;
  }
  var jm2=7+jDiv(k,30);
  var jd2=jMod(k,30)+1;
  return {jy:jy,jm:jm2,jd:jd2};
}
function gToJ(gy,gm,gd){
  var jdn=g2d(gy,gm,gd);
  var j=d2j(jdn);
  return [j.jy,j.jm,j.jd];
}
function jToG(jy,jm,jd){
  var jdn=j2d(jy,jm,jd);
  var g=d2g(jdn);
  return new Date(g.gy,g.gm-1,g.gd);
}
function toJ(ds){
  if(!ds)return"";
  var d=new Date(ds);if(isNaN(d))return"";
  var r=gToJ(d.getFullYear(),d.getMonth()+1,d.getDate());
  return faNum(r[2])+" "+JM[r[1]-1]+" "+faNum(r[0]);
}
function toJS(ds){
  if(!ds)return"";
  var d=new Date(ds);if(isNaN(d))return"";
  var r=gToJ(d.getFullYear(),d.getMonth()+1,d.getDate());
  return faNum(r[0])+"/"+faNum((r[1]<10?"0":"")+r[1])+"/"+faNum((r[2]<10?"0":"")+r[2]);
}
function todayJ(){var n=new Date();return gToJ(n.getFullYear(),n.getMonth()+1,n.getDate());}
function mStart(jy,jm){var d=jToG(jy,jm,1);return(d.getDay()+1)%7;}
function isoFromJ(jy,jm,jd){
  var g=jToG(jy,jm,jd);
  return g.getFullYear()+"-"+(g.getMonth()+1<10?"0":"")+(g.getMonth()+1)+"-"+(g.getDate()<10?"0":"")+g.getDate();
}
function daysUntilExpiry(endDate){
  if(!endDate) return null;
  var end=new Date(endDate);
  if(isNaN(end)) return null;
  var today=new Date();
  end.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  var diffMs=end-today;
  return Math.round(diffMs/(1000*60*60*24));
}
function daysUntilLabel(endDate){
  var d=daysUntilExpiry(endDate);
  if(d===null) return '-';
  if(d>0) return faNum(d)+' روز مانده';
  if(d===0) return 'امروز منقضی می‌شود';
  return faNum(Math.abs(d))+' روز پیش منقضی شد';
}
function daysUntilLabelShort(endDate){
  var d=daysUntilExpiry(endDate);
  if(d===null) return '-';
  if(d>0) return faNum(d)+' روز';
  if(d===0) return 'امروز';
  return faNum(Math.abs(d))+'- روز';
}
function daysUntilColor(endDate){
  var d=daysUntilExpiry(endDate);
  if(d===null) return 'var(--text3)';
  if(d<0) return 'var(--red)';
  if(d<=7) return 'var(--amber)';
  return 'var(--text3)';
}

// ══════ JALALI PICKER WIDGET ══════
var jpState = {};
function makeJPicker(id,label,value,onchange){
  var today=todayJ();
  var initV=value?gToJ(new Date(value).getFullYear(),new Date(value).getMonth()+1,new Date(value).getDate()):today;
  jpState[id]={jy:initV[0],jm:initV[1],value:value,cb:onchange};
  var lbl=label?'<div class="form-label">'+label+'</div>':'';
  return lbl+'<div class="jpicker" id="jp_'+id+'">'
    +'<button type="button" class="jpicker-btn" onclick="jpToggle(\''+id+'\')"><span id="jptxt_'+id+'">'+(value?toJ(value):'انتخاب تاریخ')+'</span></button>'
    +'<div class="jpicker-popup" id="jppop_'+id+'"><div class="jp-header">'
    +'<button class="jp-navbtn" onclick="jpNav(\''+id+'\',-1)">&#8250;</button>'
    +'<span class="jp-month" id="jpmon_'+id+'"></span>'
    +'<button class="jp-navbtn" onclick="jpNav(\''+id+'\',1)">&#8249;</button>'
    +'</div><div class="jp-daynames">'+JD.map(function(d){return'<div class="jp-dayname">'+d+'</div>';}).join('')+'</div>'
    +'<div class="jp-days" id="jpdays_'+id+'"></div>'
    +'<button class="jp-today-btn" onclick="jpToday(\''+id+'\')">امروز</button>'
    +'</div></div>';
}
function isLeapJalali(jy){
  return jalCal(jy).leap===0;
}
function daysInJMonth(jy,jm){
  if(jm<=6) return 31;
  if(jm<=11) return 30;
  return isLeapJalali(jy)?30:29;
}
function jpRender(id){
  var s=jpState[id];
  var el=document.getElementById('jpmon_'+id);
  if(el) el.textContent=JM[s.jm-1]+' '+faNum(s.jy);
  var dim=daysInJMonth(s.jy,s.jm);var sd=mStart(s.jy,s.jm);
  var today=todayJ();
  var selJ=s.value?gToJ(new Date(s.value).getFullYear(),new Date(s.value).getMonth()+1,new Date(s.value).getDate()):null;
  var html='';
  for(var i=0;i<sd;i++) html+='<div class="jp-day empty"></div>';
  for(var d=1;d<=dim;d++){
    var isTd=today[0]===s.jy&&today[1]===s.jm&&today[2]===d;
    var isSel=selJ&&selJ[0]===s.jy&&selJ[1]===s.jm&&selJ[2]===d;
    var cls='jp-day'+(isSel?' selected':isTd?' today':'');
    html+='<div class="'+cls+'" onclick="jpPick(\''+id+'\','+d+')">'+faNum(d)+'</div>';
  }
  var de=document.getElementById('jpdays_'+id);
  if(de) de.innerHTML=html;
}
function jpToggle(id){
  var pop=document.getElementById('jppop_'+id);
  if(!pop)return;
  var isOpen=pop.classList.contains('open');
  // close all
  document.querySelectorAll('.jpicker-popup.open').forEach(function(p){p.classList.remove('open');});
  if(!isOpen){pop.classList.add('open');jpRender(id);}
}
function jpNav(id,dir){
  var s=jpState[id];
  s.jm+=dir;
  if(s.jm>12){s.jm=1;s.jy++;}
  if(s.jm<1){s.jm=12;s.jy--;}
  jpRender(id);
}
function jpPick(id,d){
  var s=jpState[id];
  var iso=isoFromJ(s.jy,s.jm,d);
  s.value=iso;
  var txt=document.getElementById('jptxt_'+id);
  if(txt) txt.textContent=toJ(iso);
  document.getElementById('jppop_'+id).classList.remove('open');
  if(s.cb) s.cb(iso);
}
function jpToday(id){
  var s=jpState[id];var t=todayJ();
  s.jy=t[0];s.jm=t[1];
  jpPick(id,t[2]);
}

// ══════ MINI CHART ══════
function miniBar(data,color){
  var max=Math.max.apply(null,data);
  var bars=data.map(function(v,i){
    var h=Math.round((v/max)*100);
    return '<div class="bar" style="height:'+h+'%;background:'+color+';opacity:'+(i===data.length-1?1:0.35)+'"></div>';
  }).join('');
  return '<div class="chart">'+bars+'</div>';
}

function csvEscape(val){
  var s = (val===null||val===undefined) ? '' : String(val);
  if(s.indexOf(',')>-1 || s.indexOf('"')>-1 || s.indexOf('\n')>-1){
    s = '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

      toJ(u.startDate),toJ(u.endDate),statusLabel[u.status]||u.status,
      u.amount,u.notes||''].map(csvEscape).join(',');
  });
  var csv = '\uFEFF' + headers.map(csvEscape).join(',') + '\r\n' + rows.join('\r\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var dateStr = toJS(new Date()).replace(/\//g,'-');
  a.href = url;
  a.download = 'گزارش-کاربران-'+dateStr+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file){
  if(!file)return;
  var msg=document.getElementById('importMsg');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.users||!Array.isArray(data.users)){
        throw new Error('فرمت فایل نامعتبر است');
      }
      users=data.users||[];
      plans=data.plans||DEFAULT_PLANS;
      renewals=data.renewals||[];
      expenses=data.expenses||[];
      saveAll();
      if(msg){
        msg.style.display='block';
        msg.style.color='var(--green)';
        msg.textContent='✓ اطلاعات با موفقیت بازیابی شد';
      }
      renderDashboard();
      goTo('settings');
    }catch(err){
      if(msg){
        msg.style.display='block';
        msg.style.color='var(--red)';
        msg.textContent='✗ خطا در خواندن فایل پشتیبان';
      }
    }
  };
  reader.readAsText(file);
}

function addMonthsToJalali(jy,jm,jd,monthsToAdd){
  var totalMonths=(jm-1)+monthsToAdd;
  var newJy=jy+Math.floor(totalMonths/12);
  var newJm=(totalMonths%12)+1;
  var maxDay=daysInJMonth(newJy,newJm);
  var newJd=Math.min(jd,maxDay);
  return [newJy,newJm,newJd];
}

function rnewMonthsChanged(id){
  var u=users.find(function(x){return x.id==id;});
  if(!u)return;
  var monthsSel=document.getElementById('rnew_months');
  var months=Number(monthsSel?monthsSel.value:1)||1;
  // مبنای محاسبه: اگر سرویس منقضی شده، از امروز؛ در غیر این صورت از تاریخ انقضای فعلی
  var baseDate=u.endDate;
  var baseJ;
  if(baseDate){
    var bd=new Date(baseDate);
    var today=new Date();
    today.setHours(0,0,0,0);
    bd.setHours(0,0,0,0);
    baseJ = bd<today ? todayJ() : gToJ(bd.getFullYear(),bd.getMonth()+1,bd.getDate());
  } else {
    baseJ = todayJ();
  }
  var result=addMonthsToJalali(baseJ[0],baseJ[1],baseJ[2],months);
  var iso=isoFromJ(result[0],result[1],result[2]);
  // به‌روزرسانی state و نمایش picker
  jpState['rnew_end']={jy:result[0],jm:result[1],value:iso,cb:jpState['rnew_end']?jpState['rnew_end'].cb:function(v){}};
  var txt=document.getElementById('jptxt_rnew_end');
  if(txt) txt.textContent=toJ(iso);
}

  expenses.push(newExpense);
  saveAll();
  syncExpenseSave(newExpense);
  closeModal();renderFinance();
}
function delExpense(id){
  openModal('حذف هزینه',
    '<div class="confirm-box">'
    +'<div class="confirm-icon"><svg width="22" height="22" fill="none" stroke="var(--red)" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>'
    +'<div class="confirm-text">آیا از حذف این هزینه اطمینان دارید؟</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-red" style="flex:1" onclick="confirmDelExpense('+id+')">حذف</button>'
    +'<button class="btn btn-gray" style="flex:1" onclick="closeModal()">انصراف</button>'
    +'</div></div>');
}
function confirmDelExpense(id){
  expenses=expenses.filter(function(e){return e.id!==id;});
  saveAll();
  syncExpenseDelete(id);
  closeModal();renderFinance();
}

function goTo(id){
  currentPage=id;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.snavbtn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.bnitem').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('[data-page="'+id+'"]').forEach(function(b){b.classList.add('active');});
  var renders={dashboard:renderDashboard,users:renderUsers,plans:renderPlans,finance:renderFinance,reports:renderReports,settings:renderSettings};
  if(renders[id])renders[id]();
}

function buildNav(){
  var sn=document.getElementById('sideNav');
  var bn=document.getElementById('bottomnav');
  sn.innerHTML=navItems.map(function(n){
    return '<button class="snavbtn'+(n.id===currentPage?' active':'')+'" data-page="'+n.id+'" onclick="goTo(\''+n.id+'\')">'
      +n.icon+n.label+'</button>';
  }).join('');
  bn.innerHTML=navItems.map(function(n){
    return '<button class="bnitem'+(n.id===currentPage?' active':'')+'" data-page="'+n.id+'" onclick="goTo(\''+n.id+'\')">'
      +'<div class="bnicon">'+n.icon+'</div>'
      +'<span>'+n.label+'</span></button>';
  }).join('');
}
